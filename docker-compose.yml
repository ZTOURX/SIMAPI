version: "3.9"

services:
  catbot-ai:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: catbot-ai-platform
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - LOG_LEVEL=info
    volumes:
      - catbot_data:/app/artifacts/api-server/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - catbot-network

  ollama:
    image: ollama/ollama:latest
    container_name: catbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - catbot-network
    profiles:
      - ollama

volumes:
  catbot_data:
    driver: local
  ollama_models:
    driver: local

networks:
  catbot-network:
    driver: bridge
